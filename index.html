<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Pendapatan Mandiri</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --income: #10b981;
            --income-bg: #ecfdf5;
            --expense: #ef4444;
            --expense-bg: #fef2f2;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            --shadow-hover: 0 10px 15px -3px rgba(0,0,0,0.05), 0 4px 6px -4px rgba(0,0,0,0.05);
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            padding: 0; 
        }

        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden; 
            width: 100%;
        }

        /* --- STYLING HALAMAN LOGIN --- */
        #loginOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
        }

        .login-box {
            background: var(--card-bg);
            padding: 32px 24px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-hover);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .login-box h2 {
            font-size: 1.5rem;
            color: var(--text-main);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .login-box p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        .login-box .btn-add {
            width: 100%;
            margin-top: 8px;
        }

        /* Main Container disembunyikan sampai login sukses */
        #mainContainer {
            display: none; 
            width: 100%;
            max-width: 1100px; 
            margin: 0 auto; 
            flex-direction: column;
            gap: 24px;
        }

        header { 
            text-align: left; 
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        header h2 { 
            font-size: 1.6rem; 
            font-weight: 700;
            color: var(--text-main); 
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 24px;
            align-items: start;
            width: 100%;
        }

        .left-col {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: box-shadow 0.3s ease;
            width: 100%;
        }

        .card:hover {
            box-shadow: var(--shadow-hover);
        }

        .summary-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 16px; 
        }

        .sum-card { 
            padding: 20px; 
            border-radius: var(--radius-md); 
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .bg-income { background: var(--income-bg); border-color: #bbf7d0; color: #065f46; }
        .bg-expense { background: var(--expense-bg); border-color: #fecaca; color: #991b1b; }
        
        .bg-balance { 
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); 
            grid-column: span 2; 
            color: #ffffff;
            border: none;
        }

        .sum-label { 
            font-size: 0.75rem; 
            font-weight: 600;
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            opacity: 0.8;
        }

        .sum-val { 
            font-size: 1.4rem; 
            font-weight: 700; 
            letter-spacing: -0.5px;
        }
        
        .bg-balance .sum-label { color: #cbd5e1; }

        .input-group { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; text-align: left;}
        label { font-size: 0.85rem; font-weight: 600; color: var(--text-main); }
        
        input, select { 
            padding: 12px 14px; 
            border: 1px solid var(--border); 
            border-radius: var(--radius-md); 
            width: 100%; 
            font-size: 0.95rem; 
            outline: none; 
            background-color: #fff;
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        input:focus, select:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
        
        button { 
            padding: 14px; 
            border: none; 
            border-radius: var(--radius-md); 
            font-weight: 600; 
            font-size: 0.95rem;
            cursor: pointer; 
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        button:active { transform: scale(0.98); }

        .btn-add { 
            background: var(--primary); 
            color: white; 
            grid-column: span 2; 
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.2);
        }
        .btn-add:hover { background: var(--primary-hover); }
        
        .btn-copy { background: #f1f5f9; color: #334155; border: 1px solid var(--border); }
        .btn-copy:hover { background: #e2e8f0; }
        
        .btn-clear { background: #fff1f2; color: var(--expense); border: 1px solid #ffe4e6; }
        .btn-clear:hover { background: #ffe4e6; }

        .table-card {
            padding: 16px 0;
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        .table-title {
            padding: 0 24px 16px 24px;
            font-size: 1.1rem;
            font-weight: 700;
            border-bottom: 1px solid var(--border);
        }
        .table-container { 
            overflow-x: auto; 
            width: 100%;
            -webkit-overflow-scrolling: touch;
        }
        
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { 
            text-align: left; 
            padding: 14px 24px; 
            background-color: #f8fafc;
            border-bottom: 1px solid var(--border); 
            font-size: 0.75rem; 
            font-weight: 700;
            color: var(--text-muted); 
            letter-spacing: 0.5px;
        }
        td { 
            padding: 16px 24px; 
            border-bottom: 1px solid #f1f5f9; 
            font-size: 0.95rem; 
            vertical-align: middle; 
        }
        tr:last-child td { border-bottom: none; }
        
        .tag { 
            padding: 4px 10px; 
            border-radius: 9999px; 
            font-size: 0.65rem; 
            font-weight: 700; 
            display: inline-block; 
            margin-top: 6px; 
            letter-spacing: 0.5px;
        }
        .tag-in { background: #d1fae5; color: #065f46; }
        .tag-out { background: #fee2e2; color: #991b1b; }
        
        .del-btn { 
            color: var(--expense); 
            background: transparent; 
            border: 1px solid #fecdd3; 
            padding: 6px 12px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 0.75rem; 
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .del-btn:hover { background: var(--expense); color: white; border-color: var(--expense); }

        /* --- RESPONSIVE MEDIA QUERIES --- */
        @media (min-width: 768px) {
            .dashboard-grid {
                grid-template-columns: minmax(0, 1fr) minmax(0, 1.3fr);
            }
        }

        @media (max-width: 480px) {
            body { padding: 12px; }
            #mainContainer { gap: 16px; }
            header h2 { font-size: 1.35rem; }
            .card { padding: 16px; }
            
            .sum-card { padding: 14px; }
            .sum-val { font-size: 1.15rem; }
            
            input, select { font-size: 1rem; padding: 14px; }
            
            td, th { padding: 12px 16px; font-size: 0.85rem; }
            .table-title { padding: 0 16px 12px 16px; }
            
            .btn-group { grid-template-columns: 1fr; gap: 10px; }
            .btn-add { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2>Akses Terkunci</h2>
        <p>Silakan masukkan password untuk membuka laporan.</p>
        <div class="input-group">
            <input type="password" id="inputPassword" placeholder="Masukkan password...">
        </div>
        <button class="btn-add" onclick="cekPassword()">MASUK</button>
    </div>
</div>

<div class="container" id="mainContainer">
    <header>
        <h2>Rekap Pendapatan Mandiri</h2>
        <p>Kelola pencatatan aliran kas masuk dan keluar secara real-time</p>
    </header>

    <div class="dashboard-grid">
        <div class="left-col">
            <div class="summary-grid">
                <div class="sum-card bg-income">
                    <span class="sum-label">Pemasukan</span>
                    <span class="sum-val" id="totalIn">Rp 0</span>
                </div>
                <div class="sum-card bg-expense">
                    <span class="sum-label">Pengeluaran</span>
                    <span class="sum-val" id="totalOut">Rp 0</span>
                </div>
                <div class="sum-card bg-balance">
                    <span class="sum-label">Pendapatan Bersih</span>
                    <span class="sum-val" id="totalBalance">Rp 0</span>
                </div>
            </div>

            <div class="card">
                <div class="input-group">
                    <label>Jenis Transaksi</label>
                    <select id="jenis">
                        <option value="masuk">Pendapatan (Masuk)</option>
                        <option value="keluar">Pengeluaran (Keluar)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Tanggal</label>
                    <input type="date" id="tanggal">
                </div>
                <div class="input-group">
                    <label>Keterangan</label>
                    <input type="text" id="keterangan" placeholder="Contoh: Gaji bulanan, beli perlengkapan...">
                </div>
                <div class="input-group">
                    <label>Nominal (Rp)</label>
                    <input type="text" id="jumlah" placeholder="0" oninput="formatRupiahInput(this)">
                </div>
                
                <div class="btn-group">
                    <button class="btn-add" onclick="tambahData()">SIMPAN TRANSAKSI</button>
                    <button class="btn-copy" onclick="copyToClipboard()">SALIN LAPORAN</button>
                    <button class="btn-clear" onclick="hapusSemua()">RESET DATA</button>
                </div>
            </div>
        </div>

        <div class="card table-card">
            <div class="table-title">Riwayat Transaksi</div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>TANGGAL</th>
                            <th>KETERANGAN</th>
                            <th>JUMLAH</th>
                            <th>AKSI</th>
                        </tr>
                    </thead>
                    <tbody id="isiTabel"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // ⚠️ PENGATURAN PASSWORD APLIKASI
    // Ganti tulisan "admin" dengan kata sandi yang kamu inginkan
    const APP_PASSWORD = "admin";
    // ==========================================

    // Fungsi Cek Password
    function cekPassword() {
        const pwd = document.getElementById('inputPassword').value;
        if (pwd === APP_PASSWORD) {
            // Jika benar, sembunyikan overlay login dan tampilkan dashboard utama
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'flex';
        } else {
            // Jika salah, tampilkan pesan peringatan
            alert("Password salah! Silakan coba lagi.");
            document.getElementById('inputPassword').value = '';
            document.getElementById('inputPassword').focus();
        }
    }

    // Memungkinkan tombol "Enter" di keyboard untuk langsung login
    document.getElementById("inputPassword").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            cekPassword();
        }
    });

    // ⚠️ URL GOOGLE APPS SCRIPT
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyRNWsz1RU-7srpz4KSKkwTKmuYNwBa2UX1Wcoq3UQloQ3kfnRPqjFGZqy2Scs5ENC2/exec';

    const isOfflineMode = !SCRIPT_URL.startsWith('http');

    let db = [];
    document.getElementById('tanggal').valueAsDate = new Date();
    muatData();

    async function muatData() {
        if (isOfflineMode) {
            db = JSON.parse(localStorage.getItem('myMoneyDB')) || [];
            render();
            return;
        }
        try {
            const res = await fetch(SCRIPT_URL);
            db = await res.json();
            render();
        } catch (err) {
            console.error(err);
            alert("Gagal memuat data dari Google Sheets. Pastikan URL Web App benar dan koneksi internet stabil.");
        }
    }

    function formatRupiahInput(e) {
        let v = e.value.replace(/[^,\d]/g, '');
        let s = v.split(','), i = s[0].length % 3, r = s[0].substr(0, i), k = s[0].substr(i).match(/\d{3}/gi);
        if (k) { r += (i ? '.' : '') + k.join('.'); }
        e.value = s[1] != undefined ? r + ',' + s[1] : r;
    }

    async function tambahData() {
        const j = document.getElementById('jenis').value;
        const t = document.getElementById('tanggal').value;
        const k = document.getElementById('keterangan').value;
        const n = parseFloat(document.getElementById('jumlah').value.replace(/\./g, '')) || 0;

        if (!t || !k || n <= 0) return alert("Lengkapi data dengan benar!");

        const id = Date.now();

        if (isOfflineMode) {
            db.push({ id, j, t, k, n });
            localStorage.setItem('myMoneyDB', JSON.stringify(db));
            document.getElementById('keterangan').value = '';
            document.getElementById('jumlah').value = '';
            render();
            return;
        }

        document.querySelector('.btn-add').innerText = 'MENYIMPAN...';
        
        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: new URLSearchParams({ action: 'add', id, j, t, k, n })
            });
            if (response.ok) {
                document.getElementById('keterangan').value = '';
                document.getElementById('jumlah').value = '';
                await muatData();
            }
        } catch (error) {
            alert("Gagal menyimpan data ke Google Sheets.");
        } finally {
            document.querySelector('.btn-add').innerText = 'SIMPAN TRANSAKSI';
        }
    }

    function render() {
        const b = document.getElementById('isiTabel');
        b.innerHTML = '';
        let tin = 0, tout = 0;

        db.sort((x, y) => new Date(y.t) - new Date(x.t)).forEach(i => {
            if(i.j === 'masuk') tin += i.n; else tout += i.n;
            const color = i.j === 'masuk' ? 'var(--income)' : 'var(--expense)';
            const simbol = i.j === 'masuk' ? '+' : '-';

            b.innerHTML += `<tr>
                <td><small style="color:var(--text-muted); font-weight:500;">${i.t}</small></td>
                <td>
                    <strong style="color:var(--text-main); font-weight:600;">${i.k}</strong><br>
                    <span class="tag ${i.j === 'masuk' ? 'tag-in' : 'tag-out'}">${i.j.toUpperCase()}</span>
                </td>
                <td style="color:${color}"><b>${simbol}${i.n.toLocaleString('id-ID')}</b></td>
                <td><button class="del-btn" onclick="hapusSatu(${i.id})">Hapus</button></td>
            </tr>`;
        });

        document.getElementById('totalIn').innerText = `Rp ${tin.toLocaleString('id-ID')}`;
        document.getElementById('totalOut').innerText = `Rp ${tout.toLocaleString('id-ID')}`;
        document.getElementById('totalBalance').innerText = `Rp ${(tin - tout).toLocaleString('id-ID')}`;
    }

    async function hapusSatu(id) {
        if(confirm("Hapus transaksi ini?")) {
            if (isOfflineMode) {
                db = db.filter(i => i.id !== id);
                localStorage.setItem('myMoneyDB', JSON.stringify(db));
                render();
                return;
            }

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: new URLSearchParams({ action: 'delete', id })
                });
                await muatData();
            } catch (error) {
                alert("Gagal menghapus data.");
            }
        }
    }

    async function hapusSemua() {
        if(confirm("Hapus semua data?")) {
            if (isOfflineMode) {
                db = [];
                localStorage.removeItem('myMoneyDB');
                render();
                return;
            }

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: new URLSearchParams({ action: 'clear' })
                });
                await muatData();
            } catch (error) {
                alert("Gagal mereset data.");
            }
        }
    }

    function copyToClipboard() {
        if (db.length === 0) return alert("Data kosong!");
        let tin = 0, tout = 0;
        let txtIn = "*[ PEMASUKAN ]*\n";
        let txtOut = "\n*[ PENGELUARAN ]*\n";
        const sortedDb = [...db].sort((x, y) => new Date(x.t) - new Date(y.t));
        let hasIn = false, hasOut = false;

        sortedDb.forEach((i) => {
            if(i.j === 'masuk') {
                tin += i.n;
                txtIn += `- (${i.t}) ${i.k}: Rp ${i.n.toLocaleString('id-ID')}\n`;
                hasIn = true;
            } else {
                tout += i.n;
                txtOut += `- (${i.t}) ${i.k}: Rp ${i.n.toLocaleString('id-ID')}\n`;
                hasOut = true;
            }
        });

        let finalTxt = "📋 *LAPORAN PENDAPATAN MANDIRI*\n";
        finalTxt += "============================\n";
        finalTxt += (hasIn ? txtIn : "*[ PEMASUKAN ]*\n(Kosong)\n");
        finalTxt += (hasOut ? txtOut : "\n*[ PENGELUARAN ]*\n(Kosong)\n");
        finalTxt += "============================\n";
        finalTxt += `*TOTAL MASUK  : Rp ${tin.toLocaleString('id-ID')}*\n`;
        finalTxt += `*TOTAL KELUAR : Rp ${tout.toLocaleString('id-ID')}*\n`;
        finalTxt += `*PENDAPATAN BERSIH  : Rp ${(tin - tout).toLocaleString('id-ID')}*`;

        const el = document.createElement('textarea');
        el.value = finalTxt;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        alert("Wih mantap.. Laporan berhasil disalin!");
    }
</script>
</body>
</html>
